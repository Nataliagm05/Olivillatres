<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — Almacén Olivilla Tres</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f7f9fa; color: #4a3b68; min-height: 100vh; display: flex; flex-direction: column; }

    /* ===== LOGIN ===== */
    .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { background: #ffffff; border-radius: 14px; box-shadow: 0 4px 24px rgba(74,59,104,0.12); padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
    .login-card .logo { height: 52px; width: auto; margin-bottom: 1.5rem; display: block; }
    .login-card h2 { font-size: 1.2rem; font-weight: 600; color: #4a3b68; margin-bottom: 0.3rem; }
    .login-card p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
    .login-card label { font-size: 0.82rem; font-weight: 500; color: #4a3b68; display: block; margin-bottom: 5px; }
    .login-card input[type="password"] { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 1rem; color: #4a3b68; transition: border-color 0.2s; }
    .login-card input[type="password"]:focus { outline: none; border-color: #b53987; }
    .btn-login { width: 100%; background: #b53987; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-login:hover { background: #4a3b68; }
    .login-error { color: #b53987; font-size: 0.82rem; margin-top: 8px; display: none; }

    /* ===== TOPBAR ===== */
    .topbar { background-color: #35284f; padding: 6px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .topbar-title { color: #c9b8e8; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
    .topbar-title img { height: 28px; width: auto; }
    .btn-salir { background: transparent; border: 1px solid #5a4878; border-radius: 6px; color: #c9b8e8; font-size: 0.78rem; padding: 4px 12px; cursor: pointer; transition: all 0.2s; }
    .btn-salir:hover { border-color: #b53987; color: #f386cc; }

    /* ===== MAIN ===== */
    .main-wrap { flex: 1; max-width: 960px; margin: 0 auto; width: 100%; padding: 24px 16px 40px; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #4a3b68; margin-bottom: 6px; }
    .page-subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }

    /* ===== STATS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border-radius: 10px; border: 1.5px solid #ede5f5; padding: 14px 18px; }
    .stat-card .stat-label { font-size: 0.75rem; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .stat-card .stat-val { font-size: 1.8rem; font-weight: 700; color: #4a3b68; line-height: 1; }
    .stat-card.warn .stat-val { color: #b53987; }

    /* ===== FILTROS ===== */
    .filtros { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .filtros input[type="text"] { flex: 1; min-width: 180px; padding: 9px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; color: #4a3b68; transition: border-color 0.2s; }
    .filtros input[type="text"]:focus { outline: none; border-color: #b53987; }
    .filtros select { padding: 9px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; color: #4a3b68; background: #fff; cursor: pointer; transition: border-color 0.2s; }
    .filtros select:focus { outline: none; border-color: #b53987; }
    .btn-add { background: #b53987; color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 0.88rem; font-weight: 500; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
    .btn-add:hover { background: #4a3b68; }

    /* ===== PROVEEDOR LABEL ===== */
    .prov-label { font-size: 0.72rem; font-weight: 600; color: #b53987; text-transform: uppercase; letter-spacing: 0.07em; padding: 6px 0 4px; margin-top: 8px; border-top: 1.5px solid #ede5f5; display: flex; align-items: center; gap: 6px; }

    /* ===== PRODUCT ROW ===== */
    .product-row { background: #fff; border-radius: 10px; border: 1.5px solid #ede5f5; padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px; transition: border-color 0.2s; }
    .product-row:hover { border-color: #c9b8e8; }
    .prod-img { width: 52px; height: 52px; object-fit: contain; border-radius: 8px; background: #f7f0f5; flex-shrink: 0; padding: 4px; }
    .prod-img-placeholder { width: 52px; height: 52px; border-radius: 8px; background: #f0eaf8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #c9b8e8; font-size: 1.4rem; }
    .prod-info { flex: 1; min-width: 0; }
    .prod-name { font-size: 0.95rem; font-weight: 600; color: #4a3b68; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prod-desc { font-size: 0.78rem; color: #999; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stock-area { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-st { width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid #ddd; background: #f7f9fa; color: #4a3b68; font-size: 1.2rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; user-select: none; }
    .btn-st:hover { border-color: #b53987; color: #b53987; background: #fff0f8; }
    .btn-st:active { transform: scale(0.93); }
    .stock-num { font-size: 1.25rem; font-weight: 700; min-width: 38px; text-align: center; color: #4a3b68; }
    .stock-num.bajo { color: #b53987; }
    .stock-num.agotado { color: #e53e3e; }
    .unidad-tag { font-size: 0.75rem; color: #aaa; min-width: 28px; }
    .btn-editar { background: transparent; border: none; cursor: pointer; color: #bbb; font-size: 0.85rem; padding: 4px 6px; border-radius: 6px; transition: color 0.15s; }
    .btn-editar:hover { color: #b53987; }

    /* ===== EDIT INLINE ===== */
    .edit-inline { display: none; align-items: center; gap: 8px; padding: 0 16px 12px; flex-wrap: wrap; }
    .edit-inline.visible { display: flex; }
    .edit-inline span { font-size: 0.82rem; color: #888; }
    .edit-inline input[type="number"] { width: 80px; padding: 7px 10px; border: 1.5px solid #b53987; border-radius: 8px; font-size: 0.9rem; color: #4a3b68; text-align: center; }
    .edit-inline input[type="number"]:focus { outline: none; }
    .btn-guardar { background: #b53987; color: #fff; border: none; border-radius: 7px; padding: 7px 14px; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-guardar:hover { background: #4a3b68; }
    .btn-cancelar { background: transparent; border: 1.5px solid #ddd; border-radius: 7px; padding: 6px 12px; font-size: 0.82rem; color: #888; cursor: pointer; }
    .btn-cancelar:hover { border-color: #b53987; color: #b53987; }

    /* ===== MODAL NUEVO PRODUCTO ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(74,59,104,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.visible { display: flex; }
    .modal-box { background: #fff; border-radius: 14px; padding: 2rem; width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(74,59,104,0.2); }
    .modal-box h3 { font-size: 1.1rem; font-weight: 600; color: #4a3b68; margin-bottom: 1.25rem; }
    .modal-box label { font-size: 0.82rem; font-weight: 500; color: #4a3b68; display: block; margin-bottom: 4px; margin-top: 12px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; color: #4a3b68; transition: border-color 0.2s; }
    .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { outline: none; border-color: #b53987; }
    .modal-box textarea { resize: vertical; min-height: 70px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: flex-end; }

    /* ===== TOAST ===== */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: #4a3b68; color: #fff; border-radius: 8px; padding: 10px 18px; font-size: 0.88rem; box-shadow: 0 4px 14px rgba(74,59,104,0.25); opacity: 0; transform: translateY(10px); transition: all 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { background: #2d7a4f; }
    .toast.err { background: #b53987; }

    /* ===== LOADING ===== */
    .loading-row { text-align: center; color: #b53987; padding: 2rem; font-size: 0.9rem; }

    @media (max-width: 500px) {
      .prod-desc { display: none; }
      .prod-img, .prod-img-placeholder { width: 40px; height: 40px; }
      .stock-num { font-size: 1.1rem; min-width: 30px; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <img src="logonuevo2.png" class="logo" alt="Logo Olivilla Tres" onerror="this.style.display='none'">
    <h2>Acceso al inventario</h2>
    <p>Panel interno — Almacén Olivilla Tres</p>
    <label for="pwdInput">Contraseña</label>
    <input type="password" id="pwdInput" placeholder="Introduce la contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()"><i class="fa-solid fa-lock me-2"></i>Entrar</button>
    <p class="login-error" id="loginErr"><i class="fa-solid fa-circle-exclamation me-1"></i>Contraseña incorrecta</p>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appView" style="display:none; flex-direction:column; flex:1;">

  <div class="topbar">
    <div class="topbar-title">
      <img src="logonuevo2.png" alt="Logo" onerror="this.style.display='none'">
      <span>Almacén Olivilla Tres — Inventario</span>
    </div>
    <button class="btn-salir" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket me-1"></i>Salir</button>
  </div>

  <div class="main-wrap">
    <div class="page-title"><i class="fa-solid fa-boxes-stacking me-2" style="color:#b53987"></i>Gestión de Stock</div>
    <div class="page-subtitle" id="lastUpdate">Cargando datos...</div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Productos</div><div class="stat-val" id="sTot">—</div></div>
      <div class="stat-card warn"><div class="stat-label">Sin stock</div><div class="stat-val" id="sSin">—</div></div>
      <div class="stat-card warn"><div class="stat-label">Stock bajo (≤5)</div><div class="stat-val" id="sBaj">—</div></div>
    </div>

    <div class="filtros">
      <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="renderProductos()">
      <select id="filtroProveedor" onchange="renderProductos()">
        <option value="">Todos los proveedores</option>
      </select>
      <select id="filtroStock" onchange="renderProductos()">
        <option value="">Todo el stock</option>
        <option value="bajo">Stock bajo (≤5)</option>
        <option value="agotado">Sin stock</option>
      </select>
      <button class="btn-add" onclick="abrirModal()"><i class="fa-solid fa-plus"></i>Nuevo producto</button>
    </div>

    <div id="productList"><div class="loading-row"><i class="fa-solid fa-spinner fa-spin me-2"></i>Cargando productos...</div></div>
  </div>
</div>

<!-- ===== MODAL NUEVO PRODUCTO ===== -->
<div class="modal-overlay" id="modalNuevo">
  <div class="modal-box">
    <h3><i class="fa-solid fa-plus me-2" style="color:#b53987"></i>Añadir nuevo producto</h3>
    <label>Proveedor *</label>
    <select id="mProveedor">
      <option value="">Selecciona un proveedor</option>
    </select>
    <label>Nombre del producto *</label>
    <input type="text" id="mNombre" placeholder="Ej: Sika Top 107">
    <label>Descripción</label>
    <textarea id="mDesc" placeholder="Descripción breve del producto"></textarea>
    <label>URL de imagen</label>
    <input type="text" id="mImg" placeholder="https://...">
    <label>Unidad de medida</label>
    <select id="mUnidad">
      <option value="ud">ud (unidades)</option>
      <option value="m²">m²</option>
      <option value="m">m (metros)</option>
      <option value="kg">kg</option>
      <option value="saco">saco</option>
      <option value="rollo">rollo</option>
      <option value="l">l (litros)</option>
    </select>
    <label>Stock inicial</label>
    <input type="number" id="mStock" value="0" min="0">
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarNuevo()"><i class="fa-solid fa-floppy-disk me-1"></i>Guardar</button>
    </div>
  </div>
</div>

<!-- ===== TOASTS ===== -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
  // ===== CONFIGURACIÓN SUPABASE =====
  const SUPABASE_URL = 'https://wbdvvetqsrjqguwhjkkh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiZHZ2ZXRxc3JqcWd1d2hqa2toIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjI1MTEsImV4cCI6MjA5NjczODUxMX0.h1gOg5xw2fyIWUZZfdbbA-1f85rD6xgKFM3XipD35QM';
  const PASSWORD = 'olivilla2026';

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let productos = [];
  let proveedores = [];
  let editingId = null;

  // ===== AUTH =====
  function doLogin() {
    const v = document.getElementById('pwdInput').value;
    if (v === PASSWORD) {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('appView').style.display = 'flex';
      cargarDatos();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('appView').style.display = 'none';
    document.getElementById('pwdInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
  }

  // ===== SUPABASE API =====
  async function apiGet(tabla, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${params}`, { headers });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function apiPatch(tabla, id, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=eq.${id}`, {
      method: 'PATCH', headers, body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function apiPost(tabla, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
      method: 'POST', headers, body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  // ===== CARGAR DATOS =====
  async function cargarDatos() {
    try {
      proveedores = await apiGet('proveedores', 'order=nombre');
      productos = await apiGet('productos', 'order=nombre&select=*,proveedores(nombre)');

      // Poblar selectores de proveedor
      const opts = proveedores.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
      document.getElementById('filtroProveedor').innerHTML = '<option value="">Todos los proveedores</option>' + opts;
      document.getElementById('mProveedor').innerHTML = '<option value="">Selecciona un proveedor</option>' + opts;

      const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('lastUpdate').textContent = `Última actualización: ${now} — ${productos.length} productos cargados`;

      actualizarStats();
      renderProductos();
    } catch (e) {
      toast('Error al conectar con la base de datos: ' + e.message, 'err');
      document.getElementById('productList').innerHTML = `<div class="loading-row" style="color:#e53e3e"><i class="fa-solid fa-triangle-exclamation me-2"></i>No se pudo conectar. Comprueba la conexión.</div>`;
    }
  }

  // ===== STATS =====
  function actualizarStats() {
    document.getElementById('sTot').textContent = productos.length;
    document.getElementById('sSin').textContent = productos.filter(p => p.stock === 0).length;
    document.getElementById('sBaj').textContent = productos.filter(p => p.stock > 0 && p.stock <= 5).length;
  }

  // ===== RENDER =====
  function renderProductos() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtProv = document.getElementById('filtroProveedor').value;
    const filtStock = document.getElementById('filtroStock').value;

    let lista = productos.filter(p => {
      const matchQ = p.nombre.toLowerCase().includes(q) || (p.descripcion || '').toLowerCase().includes(q);
      const matchProv = !filtProv || String(p.proveedor_id) === filtProv;
      const matchStock = !filtStock ||
        (filtStock === 'agotado' && p.stock === 0) ||
        (filtStock === 'bajo' && p.stock > 0 && p.stock <= 5);
      return matchQ && matchProv && matchStock;
    });

    if (!lista.length) {
      document.getElementById('productList').innerHTML = `<div class="loading-row" style="color:#aaa"><i class="fa-solid fa-magnifying-glass me-2"></i>No se encontraron productos.</div>`;
      return;
    }

    // Agrupar por proveedor
    const grupos = {};
    lista.forEach(p => {
      const nombre = p.proveedores?.nombre || 'Sin proveedor';
      if (!grupos[nombre]) grupos[nombre] = [];
      grupos[nombre].push(p);
    });

    let html = '';
    for (const prov in grupos) {
      html += `<div class="prov-label"><i class="fa-solid fa-building me-1"></i>${prov}</div>`;
      grupos[prov].forEach(p => {
        const stockClass = p.stock === 0 ? 'agotado' : (p.stock <= 5 ? 'bajo' : '');
        const imgHtml = p.imagen_url
          ? `<img class="prod-img" src="${p.imagen_url}" alt="${p.nombre}" onerror="this.style.display='none'">`
          : `<div class="prod-img-placeholder"><i class="fa-solid fa-box"></i></div>`;
        const isEditing = editingId === p.id;
        html += `
          <div class="product-row" id="row-${p.id}">
            ${imgHtml}
            <div class="prod-info">
              <p class="prod-name">${p.nombre}</p>
              <p class="prod-desc">${p.descripcion || ''}</p>
            </div>
            <div class="stock-area">
              <button class="btn-st" onclick="cambiarStock(${p.id}, -1)" title="Restar uno">−</button>
              <span class="stock-num ${stockClass}" id="sn-${p.id}">${p.stock}</span>
              <button class="btn-st" onclick="cambiarStock(${p.id}, 1)" title="Sumar uno">+</button>
              <span class="unidad-tag">${p.unidad || 'ud'}</span>
              <button class="btn-editar" onclick="toggleEditar(${p.id})" title="Editar cantidad exacta"><i class="fa-solid fa-pen-to-square"></i></button>
            </div>
          </div>
          <div class="edit-inline ${isEditing ? 'visible' : ''}" id="edit-${p.id}">
            <span>Cantidad exacta:</span>
            <input type="number" id="inp-${p.id}" value="${p.stock}" min="0">
            <button class="btn-guardar" onclick="setStock(${p.id})"><i class="fa-solid fa-check me-1"></i>Guardar</button>
            <button class="btn-cancelar" onclick="toggleEditar(${p.id})">Cancelar</button>
          </div>
        `;
      });
    }
    document.getElementById('productList').innerHTML = html;
  }

  // ===== CAMBIAR STOCK =====
  async function cambiarStock(id, delta) {
    const p = productos.find(x => x.id === id);
    if (!p) return;
    const nuevo = Math.max(0, p.stock + delta);
    await guardarStock(id, nuevo);
  }

  async function setStock(id) {
    const val = parseInt(document.getElementById('inp-' + id).value);
    if (isNaN(val) || val < 0) { toast('Cantidad no válida', 'err'); return; }
    await guardarStock(id, val);
    editingId = null;
    renderProductos();
  }

  async function guardarStock(id, valor) {
    const p = productos.find(x => x.id === id);
    if (!p) return;
    const anterior = p.stock;
    p.stock = valor; // optimistic update
    actualizarStats();
    // Actualizar visualmente el número sin re-renderizar todo
    const el = document.getElementById('sn-' + id);
    if (el) {
      el.textContent = valor;
      el.className = 'stock-num ' + (valor === 0 ? 'agotado' : valor <= 5 ? 'bajo' : '');
    }
    try {
      await apiPatch('productos', id, { stock: valor });
      toast('Stock actualizado', 'ok');
    } catch (e) {
      p.stock = anterior; // revertir
      actualizarStats();
      renderProductos();
      toast('Error al guardar: ' + e.message, 'err');
    }
  }

  function toggleEditar(id) {
    editingId = editingId === id ? null : id;
    renderProductos();
    if (editingId === id) {
      const inp = document.getElementById('inp-' + id);
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  // ===== NUEVO PRODUCTO =====
  function abrirModal() {
    document.getElementById('modalNuevo').classList.add('visible');
    document.getElementById('mNombre').focus();
  }

  function cerrarModal() {
    document.getElementById('modalNuevo').classList.remove('visible');
    document.getElementById('mNombre').value = '';
    document.getElementById('mDesc').value = '';
    document.getElementById('mImg').value = '';
    document.getElementById('mStock').value = '0';
    document.getElementById('mProveedor').value = '';
  }

  async function guardarNuevo() {
    const provId = document.getElementById('mProveedor').value;
    const nombre = document.getElementById('mNombre').value.trim();
    if (!provId) { toast('Selecciona un proveedor', 'err'); return; }
    if (!nombre) { toast('El nombre es obligatorio', 'err'); return; }
    const body = {
      proveedor_id: parseInt(provId),
      nombre,
      descripcion: document.getElementById('mDesc').value.trim() || null,
      imagen_url: document.getElementById('mImg').value.trim() || null,
      unidad: document.getElementById('mUnidad').value,
      stock: parseInt(document.getElementById('mStock').value) || 0
    };
    try {
      const res = await apiPost('productos', body);
      cerrarModal();
      await cargarDatos();
      toast('Producto añadido correctamente', 'ok');
    } catch (e) {
      toast('Error al añadir: ' + e.message, 'err');
    }
  }

  // ===== TOAST =====
  function toast(msg, tipo = '') {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast ' + tipo;
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 2800);
  }

  // Cerrar modal al clicar fuera
  document.getElementById('modalNuevo').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });
</script>
</body>
</html>
